<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Project Dashboard</title>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #1d1d1f;
            --bg-card: #1c1c1e;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent-blue: #2997ff;
            --accent-purple: #bf5af2;
            --border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(41, 151, 255, 0.15) 0%, transparent 50%);
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2997ff 0%, #5e5ce6 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            font-weight: 600;
            color: white;
            box-shadow: 0 20px 40px rgba(41, 151, 255, 0.3);
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 19px;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: var(--accent-blue);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(41, 151, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">P</div>
        <h1>Project Dashboard</h1>
        <p>OpenClaw Workspace · 專案戰情室</p>
        <a href="PROJECT-DASHBOARD.html" class="btn">進入儀表板 →</a>
    </div>
</body>
</html>
