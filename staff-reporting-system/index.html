<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>駐點人員回報系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-width: 500px; width: 100%; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        form { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
        label .required { color: #ff453a; }
        input, textarea { width: 100%; padding: 12px; font-size: 15px; font-family: inherit; border: 1.5px solid #e2e8f0; border-radius: 10px; transition: all 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        textarea { min-height: 100px; resize: vertical; }
        .submit-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; color: white; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4); }
        .message { padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .message.show { display: block; }
        .message.success { background: rgba(34, 197, 94, 0.1); color: #16a34a; border: 1px solid rgba(34, 197, 94, 0.2); }
        .message.error { background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 駐點人員回報</h1>
            <p>Staff Visit Report System</p>
        </div>
        <form id="reportForm">
            <div class="message" id="message"></div>
            <div class="form-group">
                <label>回報人 <span class="required">*</span></label>
                <input type="text" id="reporter" required placeholder="請輸入您的姓名">
            </div>
            <div class="form-group">
                <label>駐點地點 <span class="required">*</span></label>
                <input type="text" id="location" required placeholder="請輸入駐點地點">
            </div>
            <div class="form-group">
                <label>回報內容 <span class="required">*</span></label>
                <textarea id="content" required placeholder="請詳細描述情況"></textarea>
            </div>
            <button type="submit" class="submit-btn">送出回報</button>
        </form>
    </div>
    <script>
        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert('此為範本系統，如有需要請聯繫系統管理員');
        });
    </script>
</body>
</html>
